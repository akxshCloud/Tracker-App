<svg xmlns="http://www.w3.org/2000/svg" width="160" height="40" viewBox="0 0 160 40">
  <style>
    .wordmark { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    @media (prefers-color-scheme: light) { .wordmark { fill: #37352F; } }
    @media (prefers-color-scheme: dark) { .wordmark { fill: #E8E8E3; } }
  </style>
  <!-- Icon (scaled to 32x32, offset 4px from top) -->
  <g transform="translate(0, 4) scale(0.267)">
    <circle cx="60" cy="60" r="54" fill="none" stroke="#2E7CF6" stroke-width="5" opacity="0.15"/>
    <circle cx="60" cy="60" r="54" fill="none" stroke="#2E7CF6" stroke-width="5" stroke-dasharray="160 340" stroke-dashoffset="-80" stroke-linecap="round"/>
    <polyline points="16,60 32,60 42,30 52,90 62,42 72,60 104,60" fill="none" stroke="#2E7CF6" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text class="wordmark" x="44" y="26">Pulse</text>
</svg>
